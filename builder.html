<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buyerverse — Page builder</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* ---------- app shell ---------- */
    html, body { height: 100%; }
    body.app { margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: var(--blue-pale, #eef2f9); }

    .topbar { flex: 0 0 auto; display: flex; align-items: center; gap: 16px; padding: 11px 20px; background: #fff; border-bottom: 1px solid var(--line); }
    .topbar .brand { flex: 0 0 auto; }
    .tb-mid { display: flex; align-items: center; gap: 10px; flex: 1 1 auto; min-width: 0; }
    .tb-actions { flex: 0 0 auto; display: flex; align-items: center; gap: 10px; }
    .tb-actions .btn, .tb-actions .mini-btn, .tpl-btn, .icon-btn {
      height: 38px; padding: 0 16px; font-size: .85rem; font-weight: 700;
      border-radius: 9px; display: inline-flex; align-items: center; gap: 8px; justify-content: center; cursor: pointer;
    }
    .tpl-btn { border: 1px solid var(--line); background: #fbfcfe; color: var(--ink); max-width: 320px; }
    .tpl-btn:hover { border-color: var(--blue); }
    .tpl-btn .tpl-btn-name { font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tpl-btn .caret { color: var(--muted); }
    .tpl-btn .lbl { font-size: .66rem; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); font-weight: 800; }
    .icon-btn { border: 1px solid var(--line); background: #fbfcfe; color: var(--ink-soft); }
    .icon-btn:hover { border-color: var(--blue); color: var(--blue); }
    .slug-wrap { display: flex; align-items: center; border: 1px solid var(--line); border-radius: 9px; background: #fbfcfe; overflow: hidden; height: 38px; }
    .slug-wrap .prefix { font-size: .8rem; color: var(--muted); padding: 0 2px 0 12px; }
    .slug-input { border: 0; font: inherit; font-size: .88rem; color: var(--ink); padding: 0 12px 0 2px; width: 140px; background: transparent; }
    .slug-input:focus { outline: none; }
    .slug-wrap:focus-within { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37, 99, 235, .15); }

    /* ---------- workspace: rail | form | preview ---------- */
    .workspace { flex: 1 1 auto; display: grid; grid-template-columns: 220px minmax(340px, 460px) 1fr; min-height: 0; }

    .rail { overflow-y: auto; background: #fff; border-right: 1px solid var(--line); padding: 22px 14px; }
    .rail .kicker { margin: 0 8px; }
    .rail h1 { font-size: 1.05rem; margin: 2px 8px 18px; }
    .rail-item { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; border: 0; background: transparent; cursor: pointer; font: inherit; font-size: .86rem; font-weight: 600; color: var(--ink-soft); padding: 9px 10px; border-radius: 9px; margin-bottom: 2px; }
    .rail-item:hover { background: var(--blue-pale); }
    .rail-item.active { background: var(--blue-mist); color: var(--blue-deep); }
    .rail-item .tick { flex: 0 0 auto; width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--line); display: inline-flex; align-items: center; justify-content: center; font-size: .62rem; color: transparent; }
    .rail-item.done .tick { background: var(--mint-deep); border-color: var(--mint-deep); color: #fff; }

    .form-col { position: relative; overflow-y: auto; background: #fbfcfe; border-right: 1px solid var(--line); padding: 22px 22px 120px; }
    .panel { margin-bottom: 18px; }
    .panel h2 { font-size: 1rem; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
    .panel h2 .step { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 8px; background: var(--blue-mist); color: var(--blue-deep); font-size: .8rem; font-weight: 800; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .field label { font-size: .8rem; font-weight: 700; color: var(--ink-soft); }
    .field input, .field textarea {
      font: inherit; font-size: .92rem; color: var(--ink);
      padding: 9px 12px; border: 1px solid var(--line); border-radius: 9px; background: #fff;
      transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus, .field textarea:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37, 99, 235, .15); }
    .field .hint { font-size: .74rem; color: var(--muted); }
    .field-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0 14px; }

    /* ---------- preview ---------- */
    .preview-pane { display: flex; flex-direction: column; min-width: 0; min-height: 0; }
    .preview-toolbar { flex: 0 0 auto; display: flex; align-items: center; gap: 14px; padding: 9px 16px; background: #fff; border-bottom: 1px solid var(--line); }
    .preview-toolbar .status { flex: 1 1 auto; margin: 0; font-size: .82rem; font-weight: 600; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); }
    .preview-toolbar .status.ok { color: var(--mint-deep); } .preview-toolbar .status.err { color: var(--red); }
    .seg { display: inline-flex; border: 1px solid var(--line); border-radius: 9px; overflow: hidden; background: #fbfcfe; }
    .seg button { font: inherit; font-size: .78rem; font-weight: 700; cursor: pointer; padding: 6px 12px; border: 0; background: transparent; color: var(--ink-soft); border-left: 1px solid var(--line); }
    .seg button:first-child { border-left: 0; }
    .seg button.is-active { background: var(--blue); color: #fff; }
    .preview-stage { flex: 1 1 auto; min-height: 0; overflow: auto; display: flex; justify-content: center; padding: 22px; }
    .preview-frame { width: 100%; height: 100%; border: 1px solid var(--line); border-radius: 12px; background: #fff; box-shadow: 0 18px 40px -28px rgba(15, 31, 61, .4); transition: max-width .2s; }
    .preview-frame.tablet { max-width: 820px; }
    .preview-frame.mobile { max-width: 390px; }

    /* ---------- template gallery (modal) ---------- */
    .modal { position: fixed; inset: 0; z-index: 900; display: grid; place-items: center; }
    .modal[hidden] { display: none; }
    .modal-backdrop { position: absolute; inset: 0; background: rgba(15, 31, 61, .4); }
    .modal-card { position: relative; background: #fff; border-radius: 16px; padding: 28px; width: min(720px, 92vw); max-height: 86vh; overflow: auto; box-shadow: 0 30px 80px -30px rgba(15, 31, 61, .6); }
    .modal-card h2 { margin: 0 0 4px; font-size: 1.3rem; }
    .modal-card .kicker { margin: 0 0 20px; }
    .tpl-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
    .tpl-card { text-align: left; cursor: pointer; border: 1px solid var(--line); border-radius: 13px; padding: 18px; background: #fbfcfe; display: flex; flex-direction: column; gap: 6px; transition: border-color .15s, transform .15s; }
    .tpl-card:hover { border-color: var(--blue); transform: translateY(-2px); }
    .tpl-card.is-active { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37, 99, 235, .15); }
    .tpl-card-name { font-family: var(--font-display); font-weight: 700; font-size: 1.02rem; }
    .tpl-card-desc { font-size: .82rem; color: var(--muted); }

    /* ---------- pages drawer ---------- */
    .drawer { position: fixed; inset: 0; z-index: 850; }
    .drawer[hidden] { display: none; }
    .drawer-backdrop { position: absolute; inset: 0; background: rgba(15, 31, 61, .4); }
    .drawer-panel { position: absolute; top: 0; right: 0; height: 100%; width: min(460px, 94vw); background: #fff; box-shadow: -20px 0 60px -30px rgba(15, 31, 61, .6); display: flex; flex-direction: column; }
    .drawer-panel header { flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--line); }
    .drawer-panel header h2 { margin: 0; font-size: 1.1rem; }
    .drawer-panel header button { border: 0; background: transparent; font-size: 1.4rem; line-height: 1; cursor: pointer; color: var(--muted); }
    .pages-list { flex: 1 1 auto; overflow-y: auto; padding: 18px 20px; display: flex; flex-direction: column; gap: 10px; }
    .page-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; border: 1px solid var(--line); border-radius: 11px; padding: 12px 14px; background: #fbfcfe; }
    .page-row .slug { font-family: var(--font-display); font-weight: 700; font-size: .88rem; }
    .page-row .meta { color: var(--muted); font-size: .77rem; flex: 1 1 100%; }
    .page-row .ops { display: flex; gap: 6px; }
    .mini-btn { font: inherit; font-size: .76rem; font-weight: 700; cursor: pointer; padding: 6px 11px; border-radius: 999px; border: 1px solid var(--line); background: #fff; color: var(--ink-soft); text-decoration: none; transition: all .15s; white-space: nowrap; }
    .mini-btn:hover { border-color: var(--blue); color: var(--blue); }
    .mini-btn.danger:hover { border-color: var(--red); color: var(--red); }
    .empty { color: var(--muted); font-size: .88rem; }

    /* ---------- toasts ---------- */
    .toasts { position: fixed; right: 20px; bottom: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; max-width: 360px; }
    .toast { background: #fff; border: 1px solid var(--line); border-left: 4px solid var(--blue); border-radius: 10px; padding: 12px 16px; font-size: .86rem; font-weight: 600; color: var(--ink); box-shadow: 0 14px 36px -16px rgba(15, 31, 61, .5); cursor: pointer; opacity: 0; transform: translateY(8px); transition: opacity .25s, transform .25s; }
    .toast.in { opacity: 1; transform: none; }
    .toast.out { opacity: 0; transform: translateY(8px); }
    .toast.ok { border-left-color: var(--mint-deep); }
    .toast.err { border-left-color: var(--red); }
    .toast a { color: var(--blue); }

    @media (max-width: 980px) {
      body.app { overflow: auto; height: auto; min-height: 100vh; }
      .workspace { grid-template-columns: 1fr; }
      .rail { border-right: 0; border-bottom: 1px solid var(--line); }
      .rail-list { display: flex; flex-wrap: wrap; gap: 6px; }
      .form-col { border-right: 0; border-bottom: 1px solid var(--line); padding-bottom: 32px; }
      .preview-frame { height: 70vh; }
    }
  </style>
</head>
<body class="app">
  <header class="topbar">
    <a class="brand" href="/" aria-label="Buyerverse">
      <span class="brand-mark" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="brand-name">Livestorm</span>
      <span class="brand-x">·</span>
      <span class="brand-partner">Buyerverse</span>
    </a>

    <div class="tb-mid">
      <button class="tpl-btn" id="open-gallery" type="button" title="Change template">
        <span class="lbl">Template</span>
        <span class="tpl-btn-name" id="tpl-name">—</span>
        <span class="caret" aria-hidden="true">▾</span>
      </button>
      <div class="slug-wrap" title="Page URL">
        <span class="prefix">/page/</span>
        <input class="slug-input" id="f-slug" type="text" maxlength="64" pattern="[a-z0-9](?:[a-z0-9-]{0,62}[a-z0-9])?" placeholder="acme-corp" required>
      </div>
    </div>

    <div class="tb-actions">
      <button class="icon-btn" id="open-pages" type="button">Pages</button>
      <button class="btn btn-primary" id="submit" type="button">Publish</button>
      <a class="mini-btn" href="/logout">Log out</a>
    </div>
  </header>

  <main class="workspace">
    <nav class="rail">
      <p class="kicker">Page builder</p>
      <h1>Build a proposal</h1>
      <div class="rail-list" id="rail"></div>
    </nav>

    <div class="form-col" id="form-col">
      <div id="form"></div>
    </div>

    <section class="preview-pane">
      <div class="preview-toolbar">
        <p class="status" id="preview-status">Preview</p>
        <div class="seg" role="group" aria-label="Preview size">
          <button type="button" data-device="desktop" class="is-active">Desktop</button>
          <button type="button" data-device="tablet">Tablet</button>
          <button type="button" data-device="mobile">Mobile</button>
        </div>
        <button class="mini-btn" id="preview-open" type="button">Open ↗</button>
      </div>
      <div class="preview-stage">
        <iframe class="preview-frame" id="preview" title="Page preview"></iframe>
      </div>
    </section>
  </main>

  <!-- template gallery -->
  <div class="modal" id="gallery" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card">
      <p class="kicker">Templates</p>
      <h2>Choose a template</h2>
      <p class="kicker" id="gallery-sub" style="margin-bottom:20px"></p>
      <div class="tpl-cards" id="tpl-cards"></div>
    </div>
  </div>

  <!-- pages drawer -->
  <aside class="drawer" id="pages-drawer" hidden>
    <div class="drawer-backdrop" data-close-pages></div>
    <div class="drawer-panel">
      <header>
        <h2>Pages</h2>
        <button id="pages-close" type="button" aria-label="Close">×</button>
      </header>
      <div class="pages-list" id="pages"><p class="empty">Loading…</p></div>
    </div>
  </aside>

  <div class="toasts" id="toasts" aria-live="polite"></div>

  <script>
  (function () {
    'use strict';

    var $ = function (id) { return document.getElementById(id); };
    var templates = [];        // manifests from /api/templates
    var current = null;        // selected manifest
    var sections = [];         // [{ group, el, fields }]
    var slugTouched = false;
    var previewTimer = null;
    var previewSeq = 0;
    var lastPreviewHtml = '';
    var lastBlobUrl = null;

    function api(method, path, body) {
      return fetch(path, {
        method: method,
        credentials: 'same-origin',
        headers: body ? { 'Content-Type': 'application/json' } : {},
        body: body ? JSON.stringify(body) : undefined
      }).then(function (res) {
        if (res.status === 401) { location.href = '/login'; throw new Error('Session expired'); }
        return res.json().catch(function () { return {}; }).then(function (data) {
          if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
          return data;
        });
      });
    }

    function setStatus(el, msg, ok) { el.className = 'status ' + (ok ? 'ok' : 'err'); el.innerHTML = msg; }

    function escapeText(s) { var d = document.createElement('div'); d.textContent = String(s == null ? '' : s); return d.innerHTML; }

    function slugify(s) {
      return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '')
        .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 64);
    }

    function toast(html, kind) {
      var el = document.createElement('div');
      el.className = 'toast ' + (kind || 'ok');
      el.innerHTML = html;
      var timer = setTimeout(dismiss, 6000);
      function dismiss() { clearTimeout(timer); el.classList.remove('in'); el.classList.add('out'); setTimeout(function () { el.remove(); }, 250); }
      el.addEventListener('click', dismiss);
      $('toasts').appendChild(el);
      requestAnimationFrame(function () { el.classList.add('in'); });
    }

    /* ---------- schema-driven form ---------- */

    function buildForm(manifest, values) {
      current = manifest;
      $('tpl-name').textContent = manifest.name;
      var groups = [], byGroup = {};
      manifest.fields.forEach(function (f) {
        var g = f.group || 'Details';
        if (!byGroup[g]) { byGroup[g] = []; groups.push(g); }
        byGroup[g].push(f);
      });

      var root = $('form');
      root.innerHTML = '';
      sections = [];
      groups.forEach(function (g, gi) {
        var section = document.createElement('section');
        section.className = 'card panel';
        section.id = 'sec-' + gi;
        var h = document.createElement('h2');
        h.innerHTML = '<span class="step">' + (gi + 1) + '</span> ' + escapeText(g);
        section.appendChild(h);
        var grid = document.createElement('div');
        grid.className = 'field-grid';
        byGroup[g].forEach(function (f) {
          var wrap = document.createElement('div');
          wrap.className = 'field';
          var label = document.createElement('label');
          label.setAttribute('for', 'f-' + f.id);
          label.textContent = f.label;
          wrap.appendChild(label);
          var input = f.type === 'textarea' ? document.createElement('textarea') : document.createElement('input');
          input.id = 'f-' + f.id;
          input.dataset.field = f.id;
          if (f.type !== 'textarea') input.type = f.type === 'number' ? 'number' : f.type;
          if (f.type === 'number') {
            if (f.min !== undefined) input.min = f.min;
            if (f.max !== undefined) input.max = f.max;
            input.step = f.step !== undefined ? f.step : (f.int ? 1 : 'any');
          } else if (f.max !== undefined) {
            input.maxLength = f.max;
          }
          if (f.required) input.required = true;
          if (f.placeholder) input.placeholder = f.placeholder;
          var v = values && values[f.id] !== undefined ? values[f.id] : f.default;
          if (v !== undefined) input.value = v;
          input.addEventListener('input', onFieldInput);
          wrap.appendChild(input);
          if (f.hint) {
            var hint = document.createElement('span');
            hint.className = 'hint';
            hint.textContent = f.hint;
            wrap.appendChild(hint);
          }
          grid.appendChild(wrap);
        });
        section.appendChild(grid);
        root.appendChild(section);
        sections.push({ group: g, el: section, fields: byGroup[g] });
      });

      buildRail();
      if (!slugTouched && current.nameField) {
        var nameEl = $('f-' + current.nameField);
        if (nameEl) $('f-slug').value = slugify(nameEl.value);
      }
      updateCompletion();
      $('form-col').scrollTop = 0;
      schedulePreview();
    }

    function buildRail() {
      var rail = $('rail');
      rail.innerHTML = '';
      sections.forEach(function (s, i) {
        var b = document.createElement('button');
        b.type = 'button';
        b.className = 'rail-item' + (i === 0 ? ' active' : '');
        b.dataset.idx = i;
        b.innerHTML = '<span class="tick" aria-hidden="true">✓</span> ' + escapeText(s.group);
        b.addEventListener('click', function () {
          $('form-col').scrollTo({ top: s.el.offsetTop - 16, behavior: 'smooth' });
        });
        rail.appendChild(b);
      });
    }

    function sectionComplete(s) {
      return s.fields.every(function (f) {
        if (!f.required) return true;
        var el = $('f-' + f.id);
        return el && el.value.trim() !== '';
      });
    }

    function updateCompletion() {
      document.querySelectorAll('.rail-item').forEach(function (b) {
        b.classList.toggle('done', sectionComplete(sections[+b.dataset.idx]));
      });
    }

    $('form-col').addEventListener('scroll', function () {
      var st = $('form-col').scrollTop + 28;
      var active = 0;
      sections.forEach(function (s, i) { if (s.el.offsetTop <= st) active = i; });
      document.querySelectorAll('.rail-item').forEach(function (b) {
        b.classList.toggle('active', +b.dataset.idx === active);
      });
    });

    function readValues() {
      var values = {};
      document.querySelectorAll('[data-field]').forEach(function (input) { values[input.dataset.field] = input.value; });
      return values;
    }

    function onFieldInput(e) {
      if (current && current.nameField && e.target.dataset.field === current.nameField && !slugTouched) {
        $('f-slug').value = slugify(e.target.value);
      }
      updateCompletion();
      schedulePreview();
    }

    /* ---------- live preview ---------- */

    function schedulePreview() { clearTimeout(previewTimer); previewTimer = setTimeout(renderPreview, 400); }

    function renderPreview() {
      if (!current) return;
      var seq = ++previewSeq;
      api('POST', '/api/preview', { template: current.id, values: readValues() })
        .then(function (data) {
          if (seq !== previewSeq) return;
          var html = data && data.html;
          var errs = (data && data.errors) || [];
          if (html == null) { setStatus($('preview-status'), 'Preview failed: empty response', false); return; }
          lastPreviewHtml = html;
          $('preview').srcdoc = html;
          if (errs.length) {
            setStatus($('preview-status'), errs.length + ' field' + (errs.length > 1 ? 's' : '') +
              ' using fallback: ' + escapeText(errs.join(' · ')), false);
          } else {
            setStatus($('preview-status'), 'Preview up to date', true);
          }
        })
        .catch(function (e) {
          if (seq !== previewSeq) return;
          setStatus($('preview-status'), 'Preview failed: ' + escapeText(e.message), false);
        });
    }

    document.querySelectorAll('.seg button').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.seg button').forEach(function (b) { b.classList.remove('is-active'); });
        btn.classList.add('is-active');
        $('preview').className = 'preview-frame ' + btn.getAttribute('data-device');
      });
    });

    $('preview-open').addEventListener('click', function () {
      if (!lastPreviewHtml) return;
      // a blob: document has no origin for root-relative asset URLs — inject <base>
      var base = '<base href="' + location.origin + '/">';
      var html = /<head[^>]*>/i.test(lastPreviewHtml)
        ? lastPreviewHtml.replace(/<head[^>]*>/i, function (m) { return m + base; })
        : base + lastPreviewHtml;
      if (lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
      lastBlobUrl = URL.createObjectURL(new Blob([html], { type: 'text/html' }));
      window.open(lastBlobUrl, '_blank', 'noopener');
    });

    /* ---------- template gallery ---------- */

    function findTemplate(id) { return templates.filter(function (t) { return t.id === id; })[0] || null; }

    function renderGallery() {
      var c = $('tpl-cards');
      c.innerHTML = '';
      $('gallery-sub').textContent = templates.length + ' template' + (templates.length === 1 ? '' : 's') + ' available';
      templates.forEach(function (t) {
        var card = document.createElement('button');
        card.type = 'button';
        card.className = 'tpl-card' + (current && current.id === t.id ? ' is-active' : '');
        card.innerHTML = '<span class="tpl-card-name">' + escapeText(t.name) + '</span>' +
          '<span class="tpl-card-desc">' + escapeText(t.description || '') + '</span>';
        card.addEventListener('click', function () {
          if (!current || current.id !== t.id) { slugTouched = false; buildForm(t); }
          closeGallery();
        });
        c.appendChild(card);
      });
    }
    function openGallery() { renderGallery(); $('gallery').hidden = false; }
    function closeGallery() { $('gallery').hidden = true; }
    $('open-gallery').addEventListener('click', openGallery);
    $('gallery').addEventListener('click', function (e) { if (e.target.hasAttribute('data-close')) closeGallery(); });
    document.addEventListener('keydown', function (e) { if (e.key === 'Escape') { closeGallery(); $('pages-drawer').hidden = true; } });

    /* ---------- pages drawer ---------- */

    function openPages() { $('pages-drawer').hidden = false; loadPages(); }
    function closePages() { $('pages-drawer').hidden = true; }
    $('open-pages').addEventListener('click', openPages);
    $('pages-close').addEventListener('click', closePages);
    $('pages-drawer').addEventListener('click', function (e) { if (e.target.hasAttribute('data-close-pages')) closePages(); });

    function loadPages() {
      api('GET', '/api/pages').then(function (data) {
        if (!data.pages.length) { $('pages').innerHTML = '<p class="empty">No pages yet. Fill the form and hit Publish.</p>'; return; }
        $('pages').innerHTML = '';
        data.pages.forEach(function (p) {
          var t = findTemplate(p.config.template);
          var name = (t && t.nameField && p.config.values) ? p.config.values[t.nameField] : '';
          var row = document.createElement('div');
          row.className = 'page-row';
          var date = p.updated_at ? new Date(p.updated_at).toLocaleString() : '';
          row.innerHTML =
            '<span class="slug">/page/' + p.slug + '</span>' +
            '<span class="meta">' + escapeText(name || p.slug) + (t ? ' · ' + escapeText(t.name) : '') + (date ? ' · ' + date : '') + '</span>' +
            '<span class="ops">' +
              '<a class="mini-btn" href="/page/' + p.slug + '" target="_blank" rel="noopener">View</a>' +
              '<button class="mini-btn" data-edit type="button">Edit</button>' +
              '<button class="mini-btn danger" data-del type="button">Delete</button>' +
            '</span>';
          row.querySelector('[data-edit]').addEventListener('click', function () {
            if (!t) { toast('Template "' + escapeText(p.config.template) + '" no longer exists.', 'err'); return; }
            slugTouched = true;
            buildForm(t, p.config.values);
            $('f-slug').value = p.slug;
            closePages();
          });
          row.querySelector('[data-del]').addEventListener('click', function () {
            if (!confirm('Delete /page/' + p.slug + '?')) return;
            api('DELETE', '/api/pages/' + p.slug)
              .then(function () { toast('Deleted /page/' + escapeText(p.slug), 'ok'); loadPages(); })
              .catch(function (e) { toast(escapeText(e.message), 'err'); });
          });
          $('pages').appendChild(row);
        });
      }).catch(function (e) {
        $('pages').innerHTML = '<p class="empty">' + escapeText(e.message) + '</p>';
      });
    }

    /* ---------- publish ---------- */

    $('submit').addEventListener('click', function () {
      var slug = $('f-slug').value.trim();
      if (!current) return;
      if (!/^[a-z0-9](?:[a-z0-9-]{0,62}[a-z0-9])?$/.test(slug)) { return toast('Invalid slug', 'err'); }
      api('POST', '/api/pages', { slug: slug, template: current.id, values: readValues() })
        .then(function (data) {
          toast('Published → <a href="' + data.url + '" target="_blank" rel="noopener">' + data.url + '</a>', 'ok');
        })
        .catch(function (e) { toast(escapeText(e.message), 'err'); });
    });

    /* ---------- wiring ---------- */

    $('f-slug').addEventListener('input', function () { slugTouched = true; });

    fetch('/api/templates')
      .then(function (res) { return res.json(); })
      .then(function (data) {
        templates = data.templates || [];
        if (templates.length) { buildForm(templates[0]); }
        else { $('tpl-name').textContent = 'No templates'; $('form').innerHTML = '<p class="empty">No templates available.</p>'; }
      })
      .catch(function () { $('tpl-name').textContent = 'Error'; $('form').innerHTML = '<p class="empty">Couldn\'t load templates — is the server up? Refresh to retry.</p>'; });
  })();
  </script>
</body>
</html>
