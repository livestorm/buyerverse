<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buyerverse — Page builder</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* ---------- app shell ---------- */
    html, body { height: 100%; }
    body.app { margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; background: var(--blue-pale, #eef2f9); }

    .topbar { flex: 0 0 auto; display: flex; align-items: center; gap: 16px; padding: 11px 20px; background: #fff; border-bottom: 1px solid var(--line); }
    .topbar .brand { flex: 0 0 auto; }
    .tb-mid { display: flex; align-items: center; gap: 10px; flex: 1 1 auto; min-width: 0; }
    .tb-actions { flex: 0 0 auto; display: flex; align-items: center; gap: 10px; }
    .tb-actions .btn, .tb-actions .mini-btn, .tpl-btn, .icon-btn {
      height: 38px; padding: 0 16px; font-size: .85rem; font-weight: 700;
      border-radius: 9px; display: inline-flex; align-items: center; gap: 8px; justify-content: center; cursor: pointer;
    }
    .tpl-btn { border: 1px solid var(--line); background: #fbfcfe; color: var(--ink); max-width: 320px; }
    .tpl-btn:hover { border-color: var(--blue); }
    .tpl-btn .tpl-btn-name { font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tpl-btn .caret { color: var(--muted); }
    .tpl-btn .lbl { font-size: .66rem; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); font-weight: 800; }
    .icon-btn { border: 1px solid var(--line); background: #fbfcfe; color: var(--ink-soft); }
    .icon-btn:hover { border-color: var(--blue); color: var(--blue); }
    .slug-wrap { display: flex; align-items: center; border: 1px solid var(--line); border-radius: 9px; background: #fbfcfe; overflow: hidden; height: 38px; }
    .slug-wrap .prefix { font-size: .8rem; color: var(--muted); padding: 0 2px 0 12px; }
    .slug-input { border: 0; font: inherit; font-size: .88rem; color: var(--ink); padding: 0 12px 0 2px; width: 140px; background: transparent; }
    .slug-input:focus { outline: none; }
    .slug-wrap:focus-within { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37, 99, 235, .15); }
    .slug-wrap.warn { border-color: #f59e0b; background: #fffbeb; }
    .save-state { font-size: .76rem; font-weight: 700; color: var(--muted); white-space: nowrap; }
    .save-state.saved { color: var(--mint-deep); }

    /* ---------- workspace: form | preview ---------- */
    .workspace { flex: 1 1 auto; display: grid; grid-template-columns: minmax(420px, 600px) 1fr; min-height: 0; }

    .form-col { position: relative; overflow-y: auto; background: #fbfcfe; border-right: 1px solid var(--line); padding: 0 22px 120px; }
    .form-head { position: sticky; top: 0; z-index: 6; background: #fbfcfe; padding: 18px 22px 12px; margin: 0 -22px 14px; border-bottom: 1px solid var(--line); box-shadow: 0 10px 16px -12px rgba(15, 31, 61, .35); }
    .form-head .kicker { margin: 0; }
    .form-head h1 { font-size: 1.15rem; margin: 2px 0 12px; }
    .stepper { display: flex; flex-wrap: wrap; gap: 6px; }
    .step-chip { display: inline-flex; align-items: center; gap: 7px; padding: 6px 11px; border: 1px solid var(--line); border-radius: 999px; background: #fff; font: inherit; font-size: .8rem; font-weight: 700; color: var(--ink-soft); cursor: pointer; }
    .step-chip:hover { border-color: var(--blue); }
    .step-chip.active { border-color: var(--blue); color: var(--blue-deep); background: var(--blue-mist); }
    .step-chip .tick { flex: 0 0 auto; width: 17px; height: 17px; border-radius: 50%; border: 1.5px solid var(--line); display: inline-flex; align-items: center; justify-content: center; font-size: .6rem; color: transparent; }
    .step-chip.done .tick { background: var(--mint-deep); border-color: var(--mint-deep); color: #fff; }
    .panel { margin-bottom: 18px; }
    .panel h2 { font-size: 1rem; margin-bottom: 14px; display: flex; align-items: center; gap: 10px; }
    .panel h2 .step { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 8px; background: var(--blue-mist); color: var(--blue-deep); font-size: .8rem; font-weight: 800; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .field label { font-size: .8rem; font-weight: 700; color: var(--ink-soft); }
    .field input, .field textarea {
      font: inherit; font-size: .92rem; color: var(--ink);
      width: 100%; box-sizing: border-box;
      padding: 9px 12px; border: 1px solid var(--line); border-radius: 9px; background: #fff;
      transition: border-color .15s, box-shadow .15s;
    }
    .field input:focus, .field textarea:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37, 99, 235, .15); }
    .field .hint { font-size: .74rem; color: var(--muted); }
    .field-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0 14px; }
    .with-unit { position: relative; }
    .with-unit .unit { position: absolute; right: 12px; top: 9px; font-size: .82rem; color: var(--muted); pointer-events: none; }
    .with-unit input { padding-right: 30px; }
    .field.invalid input, .field.invalid textarea { border-color: var(--red); }
    .field-err { font-size: .74rem; color: var(--red); font-weight: 600; }

    /* ---------- preview ---------- */
    .preview-pane { display: flex; flex-direction: column; min-width: 0; min-height: 0; }
    .preview-toolbar { flex: 0 0 auto; display: flex; align-items: center; gap: 14px; padding: 9px 16px; background: #fff; border-bottom: 1px solid var(--line); }
    .preview-toolbar .status { flex: 1 1 auto; margin: 0; font-size: .82rem; font-weight: 600; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--muted); }
    .preview-toolbar .status.ok { color: var(--mint-deep); } .preview-toolbar .status.err { color: var(--red); }
    .seg { display: inline-flex; border: 1px solid var(--line); border-radius: 9px; overflow: hidden; background: #fbfcfe; }
    .seg button { font: inherit; font-size: .78rem; font-weight: 700; cursor: pointer; padding: 6px 12px; border: 0; background: transparent; color: var(--ink-soft); border-left: 1px solid var(--line); }
    .seg button:first-child { border-left: 0; }
    .seg button.is-active { background: var(--blue); color: #fff; }
    .preview-stage { flex: 1 1 auto; min-height: 0; overflow: auto; display: flex; justify-content: center; padding: 22px; }
    .preview-frame { width: 100%; height: 100%; border: 1px solid var(--line); border-radius: 12px; background: #fff; box-shadow: 0 18px 40px -28px rgba(15, 31, 61, .4); transition: max-width .2s; }
    .preview-frame.tablet { max-width: 820px; }
    .preview-frame.mobile { max-width: 390px; }

    /* ---------- template gallery (modal) ---------- */
    .modal { position: fixed; inset: 0; z-index: 900; display: grid; place-items: center; }
    .modal[hidden] { display: none; }
    .modal-backdrop { position: absolute; inset: 0; background: rgba(15, 31, 61, .4); }
    .modal-card { position: relative; background: #fff; border-radius: 16px; padding: 28px; width: min(720px, 92vw); max-height: 86vh; overflow: auto; box-shadow: 0 30px 80px -30px rgba(15, 31, 61, .6); }
    .modal-card h2 { margin: 0 0 4px; font-size: 1.3rem; }
    .modal-card .kicker { margin: 0 0 20px; }
    .tpl-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
    .tpl-card { text-align: left; cursor: pointer; border: 1px solid var(--line); border-radius: 13px; padding: 18px; background: #fbfcfe; display: flex; flex-direction: column; gap: 6px; transition: border-color .15s, transform .15s; }
    .tpl-card:hover { border-color: var(--blue); transform: translateY(-2px); }
    .tpl-card.is-active { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37, 99, 235, .15); }
    .tpl-card-name { font-family: var(--font-display); font-weight: 700; font-size: 1.02rem; }
    .tpl-card-desc { font-size: .82rem; color: var(--muted); }

    /* ---------- pages drawer ---------- */
    .drawer { position: fixed; inset: 0; z-index: 850; }
    .drawer[hidden] { display: none; }
    .drawer-backdrop { position: absolute; inset: 0; background: rgba(15, 31, 61, .4); }
    .drawer-panel { position: absolute; top: 0; right: 0; height: 100%; width: min(460px, 94vw); background: #fff; box-shadow: -20px 0 60px -30px rgba(15, 31, 61, .6); display: flex; flex-direction: column; }
    .drawer-panel header { flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--line); }
    .drawer-panel header h2 { margin: 0; font-size: 1.1rem; }
    .drawer-panel header button { border: 0; background: transparent; font-size: 1.4rem; line-height: 1; cursor: pointer; color: var(--muted); }
    .drawer-tools { flex: 0 0 auto; display: flex; gap: 8px; padding: 12px 20px; border-bottom: 1px solid var(--line); }
    .drawer-tools input, .drawer-tools select { font: inherit; font-size: .82rem; padding: 7px 10px; border: 1px solid var(--line); border-radius: 8px; background: #fbfcfe; }
    .drawer-tools input { flex: 1 1 auto; min-width: 0; }
    .pages-list { flex: 1 1 auto; overflow-y: auto; padding: 18px 20px; display: flex; flex-direction: column; gap: 10px; }
    .page-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; border: 1px solid var(--line); border-radius: 11px; padding: 12px 14px; background: #fbfcfe; }
    .page-row .slug { font-family: var(--font-display); font-weight: 700; font-size: .88rem; }
    .page-row .meta { color: var(--muted); font-size: .77rem; flex: 1 1 100%; }
    .page-row .ops { display: flex; gap: 6px; }
    .mini-btn { font: inherit; font-size: .76rem; font-weight: 700; cursor: pointer; padding: 6px 11px; border-radius: 999px; border: 1px solid var(--line); background: #fff; color: var(--ink-soft); text-decoration: none; transition: all .15s; white-space: nowrap; }
    .mini-btn:hover { border-color: var(--blue); color: var(--blue); }
    .mini-btn.danger:hover { border-color: var(--red); color: var(--red); }
    .empty { color: var(--muted); font-size: .88rem; }

    /* ---------- toasts ---------- */
    .toasts { position: fixed; right: 20px; bottom: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000; max-width: 360px; }
    .toast { background: #fff; border: 1px solid var(--line); border-left: 4px solid var(--blue); border-radius: 10px; padding: 12px 16px; font-size: .86rem; font-weight: 600; color: var(--ink); box-shadow: 0 14px 36px -16px rgba(15, 31, 61, .5); cursor: pointer; opacity: 0; transform: translateY(8px); transition: opacity .25s, transform .25s; }
    .toast.in { opacity: 1; transform: none; }
    .toast.out { opacity: 0; transform: translateY(8px); }
    .toast.ok { border-left-color: var(--mint-deep); }
    .toast.err { border-left-color: var(--red); }
    .toast a { color: var(--blue); }

    /* ---------- salesforce autofill ---------- */
    .autofill { display: flex; align-items: center; gap: 8px; padding: 12px 14px; margin-bottom: 18px; border: 1px solid var(--line); border-radius: 11px; background: #fff; }
    .autofill .lbl { font-size: .68rem; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); font-weight: 800; white-space: nowrap; }
    .autofill input { flex: 1 1 auto; min-width: 0; font: inherit; font-size: .86rem; padding: 8px 10px; border: 1px solid var(--line); border-radius: 8px; background: #fbfcfe; }
    .autofill input:focus { outline: none; border-color: var(--blue); }

    /* ---------- restore draft bar ---------- */
    .restore-bar { display: flex; align-items: center; gap: 10px; padding: 10px 14px; margin-bottom: 16px; border: 1px solid #fde68a; background: #fffbeb; border-radius: 11px; font-size: .84rem; font-weight: 600; color: #92400e; }
    .restore-bar[hidden] { display: none; }
    .restore-bar .spacer { flex: 1 1 auto; }

    /* ---------- share modal ---------- */
    .share-url { display: flex; gap: 8px; margin: 16px 0; }
    .share-url input { flex: 1 1 auto; min-width: 0; font: inherit; font-size: .85rem; padding: 9px 12px; border: 1px solid var(--line); border-radius: 9px; background: #fbfcfe; color: var(--ink); }
    .share-qr { display: block; margin: 0 auto 16px; border-radius: 10px; }
    .share-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

    /* ---------- analytics modal ---------- */
    .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin: 18px 0 8px; }
    .stat-card { border: 1px solid var(--line); border-radius: 12px; padding: 14px 16px; background: #fbfcfe; }
    .stat-card .v { font-family: var(--font-display); font-weight: 800; font-size: 1.55rem; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .stat-card .l { font-size: .72rem; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin-top: 4px; }
    .an-h { font-size: .95rem; margin: 22px 0 10px; }
    .an-table { display: flex; flex-direction: column; gap: 6px; }
    .an-row { display: flex; align-items: center; gap: 10px; font-size: .85rem; padding: 8px 12px; border: 1px solid var(--line); border-radius: 9px; background: #fbfcfe; }
    .an-row .nm { flex: 1 1 auto; font-weight: 700; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .an-row .st { color: var(--muted); font-size: .78rem; white-space: nowrap; }
    .an-empty { color: var(--muted); font-size: .88rem; }
    .src-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: .84rem; }
    .src-row .nm { width: 130px; flex: 0 0 auto; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .src-row .bar { flex: 1 1 auto; height: 10px; background: var(--blue-pale); border-radius: 6px; overflow: hidden; }
    .src-row .bar i { display: block; height: 100%; background: var(--blue); }
    .src-row .ct { width: 46px; flex: 0 0 auto; text-align: right; color: var(--muted); }

    @media (max-width: 980px) {
      body.app { overflow: auto; height: auto; min-height: 100vh; }
      .workspace { grid-template-columns: 1fr; }
      .form-col { border-right: 0; border-bottom: 1px solid var(--line); padding-bottom: 32px; }
      .preview-frame { height: 70vh; }
    }
  </style>
</head>
<body class="app">
  <header class="topbar">
    <a class="brand" href="/" aria-label="Buyerverse">
      <span class="brand-mark" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="brand-name">Livestorm</span>
      <span class="brand-x">·</span>
      <span class="brand-partner">Buyerverse</span>
    </a>

    <div class="tb-mid">
      <button class="tpl-btn" id="open-gallery" type="button" title="Change template">
        <span class="lbl">Template</span>
        <span class="tpl-btn-name" id="tpl-name">—</span>
        <span class="caret" aria-hidden="true">▾</span>
      </button>
      <div class="slug-wrap" title="Page URL">
        <span class="prefix">/page/</span>
        <input class="slug-input" id="f-slug" type="text" maxlength="64" pattern="[a-z0-9](?:[a-z0-9-]{0,62}[a-z0-9])?" placeholder="acme-corp" required>
      </div>
    </div>

    <div class="tb-actions">
      <span class="save-state" id="save-state" aria-live="polite"></span>
      <button class="icon-btn" id="open-analytics" type="button">Analytics</button>
      <button class="icon-btn" id="open-pages" type="button">Pages</button>
      <button class="btn btn-primary" id="submit" type="button">Publish</button>
      <a class="mini-btn" href="/logout">Log out</a>
    </div>
  </header>

  <main class="workspace">
    <div class="form-col" id="form-col">
      <div class="form-head">
        <p class="kicker">Page builder</p>
        <h1>Build a proposal</h1>
        <div class="stepper" id="stepper" role="tablist" aria-label="Form sections"></div>
      </div>
      <div class="restore-bar" id="restore-bar" hidden>
        <span id="restore-text">Unsaved draft found.</span>
        <span class="spacer"></span>
        <button class="mini-btn" id="restore-yes" type="button">Restore</button>
        <button class="mini-btn" id="restore-no" type="button">Discard</button>
      </div>
      <div class="autofill">
        <span class="lbl">Salesforce</span>
        <input id="sf-id" type="text" placeholder="Account or Contact ID" autocomplete="off">
        <button class="mini-btn" id="sf-fetch" type="button">Fetch</button>
      </div>
      <div id="form"></div>
    </div>

    <section class="preview-pane">
      <div class="preview-toolbar">
        <p class="status" id="preview-status">Preview</p>
        <div class="seg" role="group" aria-label="Preview size">
          <button type="button" data-device="desktop" class="is-active">Desktop</button>
          <button type="button" data-device="tablet">Tablet</button>
          <button type="button" data-device="mobile">Mobile</button>
        </div>
        <button class="mini-btn" id="preview-open" type="button">Open ↗</button>
      </div>
      <div class="preview-stage">
        <iframe class="preview-frame" id="preview" title="Page preview"></iframe>
      </div>
    </section>
  </main>

  <!-- template gallery -->
  <div class="modal" id="gallery" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="Choose a template">
      <p class="kicker">Templates</p>
      <h2>Choose a template</h2>
      <p class="kicker" id="gallery-sub" style="margin-bottom:20px"></p>
      <div class="tpl-cards" id="tpl-cards"></div>
    </div>
  </div>

  <!-- share modal -->
  <div class="modal" id="share" hidden>
    <div class="modal-backdrop" data-close-share></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="Share proposal" style="width:min(440px,92vw)">
      <p class="kicker">Share</p>
      <h2 id="share-title">Proposal published</h2>
      <div class="share-url">
        <input id="share-link" type="text" readonly>
        <button class="mini-btn" id="share-copy" type="button">Copy</button>
      </div>
      <canvas id="share-qr" class="share-qr"></canvas>
      <div class="share-actions">
        <a class="mini-btn" id="share-open" target="_blank" rel="noopener">Open ↗</a>
        <a class="mini-btn" id="share-email">Email…</a>
        <button class="mini-btn" data-close-share type="button">Close</button>
      </div>
    </div>
  </div>

  <!-- analytics modal -->
  <div class="modal" id="analytics" hidden>
    <div class="modal-backdrop" data-close-analytics></div>
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="Analytics" style="width:min(760px,94vw)">
      <p class="kicker">Analytics</p>
      <h2>Proposal performance</h2>
      <div class="stat-cards" id="an-cards"></div>
      <h3 class="an-h">Top pages</h3>
      <div class="an-table" id="an-top"></div>
      <h3 class="an-h">Sources</h3>
      <div id="an-sources"></div>
    </div>
  </div>

  <!-- pages drawer -->
  <aside class="drawer" id="pages-drawer" hidden>
    <div class="drawer-backdrop" data-close-pages></div>
    <div class="drawer-panel" role="dialog" aria-modal="true" aria-label="Pages library">
      <header>
        <h2>Pages</h2>
        <button id="pages-close" type="button" aria-label="Close">×</button>
      </header>
      <div class="drawer-tools">
        <input id="pages-search" type="text" placeholder="Search pages…" aria-label="Search pages">
        <select id="pages-sort" aria-label="Sort pages">
          <option value="updated">Recently updated</option>
          <option value="views">Most views</option>
          <option value="name">Name A–Z</option>
        </select>
      </div>
      <div class="pages-list" id="pages"><p class="empty">Loading…</p></div>
    </div>
  </aside>

  <div class="toasts" id="toasts" aria-live="polite"></div>

  <script src="/qr.js"></script>
  <script>
  (function () {
    'use strict';

    var $ = function (id) { return document.getElementById(id); };
    var SLUG_RE = /^[a-z0-9](?:[a-z0-9-]{0,62}[a-z0-9])?$/;
    var templates = [];        // manifests from /api/templates
    var current = null;        // selected manifest
    var sections = [];         // [{ group, el, fields }]
    var slugTouched = false;
    var editingSlug = null;    // slug loaded via Edit (so re-publishing it isn't an "overwrite")
    var knownSlugs = {};       // slugs that already exist (overwrite warning)
    var allPages = [];         // last fetched pages (for search/sort in the drawer)
    var previewTimer = null;
    var previewSeq = 0;
    var lastPreviewHtml = '';
    var lastBlobUrl = null;
    var DRAFT_KEY = 'buyerverse-draft';
    var dirty = false;

    function api(method, path, body) {
      return fetch(path, {
        method: method,
        credentials: 'same-origin',
        headers: body ? { 'Content-Type': 'application/json' } : {},
        body: body ? JSON.stringify(body) : undefined
      }).then(function (res) {
        if (res.status === 401) { location.href = '/login'; throw new Error('Session expired'); }
        return res.json().catch(function () { return {}; }).then(function (data) {
          if (!res.ok) throw new Error(data.error || ('HTTP ' + res.status));
          return data;
        });
      });
    }

    function setStatus(el, msg, ok) { el.className = 'status ' + (ok ? 'ok' : 'err'); el.innerHTML = msg; }
    function saveState(text, ok) { var el = $('save-state'); el.textContent = text || ''; el.className = 'save-state' + (ok ? ' saved' : ''); }
    function escapeText(s) { var d = document.createElement('div'); d.textContent = String(s == null ? '' : s); return d.innerHTML; }

    function slugify(s) {
      return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '')
        .replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 64);
    }

    function toast(html, kind) {
      var el = document.createElement('div');
      el.className = 'toast ' + (kind || 'ok');
      el.innerHTML = html;
      var timer = setTimeout(dismiss, 6000);
      function dismiss() { clearTimeout(timer); el.classList.remove('in'); el.classList.add('out'); setTimeout(function () { el.remove(); }, 250); }
      el.addEventListener('click', dismiss);
      $('toasts').appendChild(el);
      requestAnimationFrame(function () { el.classList.add('in'); });
    }

    /* ---------- field validation (mirrors the server engine) ---------- */

    function fieldById(id) { return current && current.fields.filter(function (f) { return f.id === id; })[0]; }

    function validateField(f, raw) {
      if (f.type === 'number') {
        if (raw === '' || raw == null) return f.required ? 'Required' : null;
        var n = Number(raw);
        if (!isFinite(n)) return 'Must be a number';
        if (f.min !== undefined && n < f.min) return 'Minimum ' + f.min;
        if (f.max !== undefined && n > f.max) return 'Maximum ' + f.max;
        return null;
      }
      var s = String(raw).trim();
      if (!s) return f.required ? 'Required' : null;
      var max = f.max !== undefined ? f.max : (f.type === 'email' ? 120 : (f.type === 'textarea' ? 5000 : 1000));
      if (s.length > max) return 'Max ' + max + ' characters';
      if (f.type === 'email' && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s)) return 'Invalid email';
      return null;
    }

    function showFieldError(f) {
      if (!f) return;
      var el = $('f-' + f.id); if (!el) return;
      var msg = validateField(f, el.value);
      el.closest('.field').classList.toggle('invalid', !!msg);
      var errEl = $('err-' + f.id); if (errEl) errEl.textContent = msg || '';
    }

    /* ---------- schema-driven form ---------- */

    function buildForm(manifest, values) {
      current = manifest;
      $('tpl-name').textContent = manifest.name;
      var groups = [], byGroup = {};
      manifest.fields.forEach(function (f) {
        var g = f.group || 'Details';
        if (!byGroup[g]) { byGroup[g] = []; groups.push(g); }
        byGroup[g].push(f);
      });

      var root = $('form');
      root.innerHTML = '';
      sections = [];
      groups.forEach(function (g, gi) {
        var section = document.createElement('section');
        section.className = 'card panel';
        section.id = 'sec-' + gi;
        var h = document.createElement('h2');
        h.innerHTML = '<span class="step">' + (gi + 1) + '</span> ' + escapeText(g);
        section.appendChild(h);
        var grid = document.createElement('div');
        grid.className = 'field-grid';
        byGroup[g].forEach(function (f) {
          var wrap = document.createElement('div');
          wrap.className = 'field';
          var label = document.createElement('label');
          label.setAttribute('for', 'f-' + f.id);
          label.textContent = f.label;
          wrap.appendChild(label);
          var input = f.type === 'textarea' ? document.createElement('textarea') : document.createElement('input');
          input.id = 'f-' + f.id;
          input.dataset.field = f.id;
          if (f.type !== 'textarea') input.type = f.type === 'number' ? 'number' : f.type;
          if (f.type === 'number') {
            if (f.min !== undefined) input.min = f.min;
            if (f.max !== undefined) input.max = f.max;
            input.step = f.step !== undefined ? f.step : (f.int ? 1 : 'any');
          } else if (f.max !== undefined) {
            input.maxLength = f.max;
          }
          if (f.required) input.required = true;
          if (f.placeholder) input.placeholder = f.placeholder;
          var v = values && values[f.id] !== undefined ? values[f.id] : f.default;
          if (v !== undefined) input.value = v;
          input.addEventListener('input', onFieldInput);
          input.addEventListener('blur', function () { showFieldError(f); });
          if (f.type === 'number' && f.unit) {
            var uw = document.createElement('div');
            uw.className = 'with-unit';
            uw.appendChild(input);
            var us = document.createElement('span'); us.className = 'unit'; us.textContent = f.unit;
            uw.appendChild(us);
            wrap.appendChild(uw);
          } else {
            wrap.appendChild(input);
          }
          if (f.hint) {
            var hint = document.createElement('span');
            hint.className = 'hint';
            hint.textContent = f.hint;
            wrap.appendChild(hint);
          }
          var err = document.createElement('span'); err.className = 'field-err'; err.id = 'err-' + f.id;
          wrap.appendChild(err);
          grid.appendChild(wrap);
        });
        section.appendChild(grid);
        root.appendChild(section);
        sections.push({ group: g, el: section, fields: byGroup[g] });
      });

      buildStepper();
      if (!slugTouched && current.nameField) {
        var nameEl = $('f-' + current.nameField);
        if (nameEl) $('f-slug').value = slugify(nameEl.value);
      }
      updateCompletion();
      updateSlugWarn();
      $('form-col').scrollTop = 0;
      schedulePreview();
    }

    function buildStepper() {
      var st = $('stepper');
      st.innerHTML = '';
      sections.forEach(function (s, i) {
        var b = document.createElement('button');
        b.type = 'button';
        b.className = 'step-chip' + (i === 0 ? ' active' : '');
        b.dataset.idx = i;
        b.setAttribute('role', 'tab');
        b.setAttribute('aria-current', i === 0 ? 'true' : 'false');
        b.innerHTML = '<span class="tick" aria-hidden="true">✓</span> ' + escapeText(s.group);
        b.addEventListener('click', function () {
          var head = document.querySelector('.form-head');
          var off = (head ? head.offsetHeight : 80) + 8;
          $('form-col').scrollTo({ top: s.el.offsetTop - off, behavior: 'smooth' });
        });
        st.appendChild(b);
      });
    }

    function sectionComplete(s) {
      return s.fields.every(function (f) {
        var el = $('f-' + f.id);
        return el && validateField(f, el.value) === null;
      });
    }

    function updateCompletion() {
      document.querySelectorAll('.step-chip').forEach(function (b) {
        b.classList.toggle('done', sectionComplete(sections[+b.dataset.idx]));
      });
    }

    $('form-col').addEventListener('scroll', function () {
      var head = document.querySelector('.form-head');
      var pad = (head ? head.offsetHeight : 80) + 12;
      var st = $('form-col').scrollTop + pad;
      var active = 0;
      sections.forEach(function (s, i) { if (s.el.offsetTop <= st) active = i; });
      document.querySelectorAll('.step-chip').forEach(function (b) {
        var on = +b.dataset.idx === active;
        b.classList.toggle('active', on);
        b.setAttribute('aria-current', on ? 'true' : 'false');
      });
    });

    function readValues() {
      var values = {};
      document.querySelectorAll('[data-field]').forEach(function (input) { values[input.dataset.field] = input.value; });
      return values;
    }

    function onFieldInput(e) {
      var fid = e.target.dataset.field;
      if (current && current.nameField && fid === current.nameField && !slugTouched) {
        $('f-slug').value = slugify(e.target.value);
        updateSlugWarn();
      }
      var wrap = e.target.closest('.field');
      if (wrap && wrap.classList.contains('invalid')) showFieldError(fieldById(fid)); // clear once valid
      updateCompletion();
      markDirty();
      schedulePreview();
    }

    /* ---------- slug overwrite warning ---------- */

    function updateSlugWarn() {
      var s = $('f-slug').value.trim();
      var collide = !!knownSlugs[s] && s !== editingSlug;
      var wrap = document.querySelector('.slug-wrap');
      wrap.classList.toggle('warn', collide);
      wrap.title = location.origin + '/page/' + s + (collide ? '  —  already exists, publishing overwrites it' : '');
    }

    /* ---------- live preview ---------- */

    // The preview runs detached (srcdoc / blob), so its base URL is the builder,
    // not the proposal page. Inject a <base> so root-relative asset URLs resolve,
    // and intercept in-page (#anchor) clicks so the proposal's own nav scrolls
    // within the preview instead of navigating away to the builder.
    function decorate(html) {
      var inject = '<base href="' + location.origin + '/">' +
        '<scr' + 'ipt>document.addEventListener("click",function(e){' +
        'var a=e.target.closest&&e.target.closest(\'a[href^="#"]\');if(!a)return;' +
        'e.preventDefault();var id=a.getAttribute("href").slice(1);' +
        'var t=id?document.getElementById(id):null;if(t)t.scrollIntoView({behavior:"smooth"});' +
        '},true);</scr' + 'ipt>';
      return /<head[^>]*>/i.test(html) ? html.replace(/<head[^>]*>/i, function (m) { return m + inject; }) : inject + html;
    }

    function schedulePreview() { clearTimeout(previewTimer); previewTimer = setTimeout(renderPreview, 400); }

    function renderPreview() {
      if (!current) return;
      var seq = ++previewSeq;
      api('POST', '/api/preview', { template: current.id, values: readValues() })
        .then(function (data) {
          if (seq !== previewSeq) return;
          var html = data && data.html;
          var errs = (data && data.errors) || [];
          if (html == null) { setStatus($('preview-status'), 'Preview failed: empty response', false); return; }
          lastPreviewHtml = html;
          $('preview').srcdoc = decorate(html);
          if (errs.length) {
            setStatus($('preview-status'), errs.length + ' field' + (errs.length > 1 ? 's' : '') +
              ' using fallback: ' + escapeText(errs.join(' · ')), false);
          } else {
            setStatus($('preview-status'), 'Preview up to date', true);
          }
        })
        .catch(function (e) {
          if (seq !== previewSeq) return;
          setStatus($('preview-status'), 'Preview failed: ' + escapeText(e.message), false);
        });
    }

    document.querySelectorAll('.seg button').forEach(function (btn) {
      btn.addEventListener('click', function () {
        document.querySelectorAll('.seg button').forEach(function (b) { b.classList.remove('is-active'); });
        btn.classList.add('is-active');
        $('preview').className = 'preview-frame ' + btn.getAttribute('data-device');
      });
    });

    $('preview-open').addEventListener('click', function () {
      if (!lastPreviewHtml) return;
      if (lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
      lastBlobUrl = URL.createObjectURL(new Blob([decorate(lastPreviewHtml)], { type: 'text/html' }));
      window.open(lastBlobUrl, '_blank', 'noopener');
    });

    /* ---------- drafts (local autosave + unload guard) ---------- */

    function markDirty() { dirty = true; saveDraft(); saveState('Draft saved', true); }
    function saveDraft() {
      if (!current) return;
      try { localStorage.setItem(DRAFT_KEY, JSON.stringify({ template: current.id, slug: $('f-slug').value, values: readValues(), at: Date.now() })); } catch (e) {}
    }
    function clearDraft() { dirty = false; try { localStorage.removeItem(DRAFT_KEY); } catch (e) {} }
    window.addEventListener('beforeunload', function (e) { if (dirty) { e.preventDefault(); e.returnValue = ''; } });

    function maybeOfferRestore() {
      var d;
      try { d = JSON.parse(localStorage.getItem(DRAFT_KEY) || 'null'); } catch (e) { return; }
      if (!d || !findTemplate(d.template)) return;
      $('restore-text').textContent = 'Unsaved draft for /page/' + (d.slug || '…') + '.';
      $('restore-bar').hidden = false;
      $('restore-yes').onclick = function () {
        slugTouched = true; editingSlug = null;
        buildForm(findTemplate(d.template), d.values);
        $('f-slug').value = d.slug || '';
        updateSlugWarn();
        $('restore-bar').hidden = true;
        dirty = true; saveState('Draft restored', true);
      };
      $('restore-no').onclick = function () { clearDraft(); saveState(''); $('restore-bar').hidden = true; };
    }

    /* ---------- salesforce autofill ---------- */

    $('sf-fetch').addEventListener('click', function () {
      var id = $('sf-id').value.trim();
      if (!id || !current) return;
      $('sf-fetch').disabled = true;
      api('GET', '/api/crm/salesforce/' + encodeURIComponent(id))
        .then(function (data) {
          var v = (data && data.values) || {};
          var n = 0;
          Object.keys(v).forEach(function (k) {
            var el = $('f-' + k);
            if (el && v[k] != null) {
              el.value = v[k]; n++;
              if (k === current.nameField && !slugTouched) { $('f-slug').value = slugify(el.value); updateSlugWarn(); }
            }
          });
          updateCompletion(); markDirty(); schedulePreview();
          toast(n ? ('Prefilled ' + n + ' field' + (n > 1 ? 's' : '') + ' from Salesforce') : 'No matching fields returned', n ? 'ok' : 'err');
        })
        .catch(function (e) { toast('Salesforce: ' + escapeText(e.message), 'err'); })
        .finally(function () { $('sf-fetch').disabled = false; });
    });

    /* ---------- overlays (modals/drawer) with focus management ---------- */

    var lastFocus = null;
    function openOverlay(el) {
      lastFocus = document.activeElement;
      el.hidden = false;
      var f = el.querySelector('input:not([type=hidden]), button, select, textarea, a[href]');
      if (f && f.focus) f.focus();
    }
    function closeOverlay(el) { el.hidden = true; if (lastFocus && lastFocus.focus) lastFocus.focus(); }
    function topOverlay() { return [$('pages-drawer'), $('gallery'), $('share'), $('analytics')].filter(function (o) { return !o.hidden; }).pop(); }

    document.addEventListener('keydown', function (e) {
      if ((e.metaKey || e.ctrlKey) && (e.key === 's' || e.key === 'S')) { e.preventDefault(); $('submit').click(); return; }
      var ov = topOverlay();
      if (e.key === 'Escape' && ov) { closeOverlay(ov); return; }
      if (e.key === 'Tab' && ov) {
        var nodes = ov.querySelectorAll('a[href], button:not([disabled]), input:not([disabled]), select, textarea');
        var f = Array.prototype.filter.call(nodes, function (n) { return n.offsetParent !== null; });
        if (!f.length) return;
        var first = f[0], last = f[f.length - 1];
        if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
        else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
      }
    });

    /* ---------- share ---------- */

    function openShare(path) {
      var url = location.origin + path;
      $('share-link').value = url;
      $('share-open').href = url;
      $('share-email').href = 'mailto:?subject=' + encodeURIComponent('Your Livestorm proposal') +
        '&body=' + encodeURIComponent('Here is your personalized proposal:\n' + url);
      try { if (window.QR) QR.toCanvas(url, $('share-qr'), { scale: 5, margin: 3 }); } catch (e) {}
      openOverlay($('share'));
    }
    $('share-copy').addEventListener('click', function () {
      var v = $('share-link').value;
      if (navigator.clipboard) navigator.clipboard.writeText(v).then(function () { toast('Link copied', 'ok'); }, function () {});
      else { $('share-link').select(); try { document.execCommand('copy'); toast('Link copied', 'ok'); } catch (e) {} }
    });
    $('share').addEventListener('click', function (e) { if (e.target.hasAttribute('data-close-share')) closeOverlay($('share')); });

    /* ---------- template gallery ---------- */

    function findTemplate(id) { return templates.filter(function (t) { return t.id === id; })[0] || null; }

    function renderGallery() {
      var c = $('tpl-cards');
      c.innerHTML = '';
      $('gallery-sub').textContent = templates.length + ' template' + (templates.length === 1 ? '' : 's') + ' available';
      templates.forEach(function (t) {
        var card = document.createElement('button');
        card.type = 'button';
        card.className = 'tpl-card' + (current && current.id === t.id ? ' is-active' : '');
        card.innerHTML = '<span class="tpl-card-name">' + escapeText(t.name) + '</span>' +
          '<span class="tpl-card-desc">' + escapeText(t.description || '') + '</span>';
        card.addEventListener('click', function () {
          if (!current || current.id !== t.id) { slugTouched = false; editingSlug = null; buildForm(t); }
          closeOverlay($('gallery'));
        });
        c.appendChild(card);
      });
    }
    $('open-gallery').addEventListener('click', function () { renderGallery(); openOverlay($('gallery')); });
    $('gallery').addEventListener('click', function (e) { if (e.target.hasAttribute('data-close')) closeOverlay($('gallery')); });

    /* ---------- pages drawer ---------- */

    $('open-pages').addEventListener('click', function () { openOverlay($('pages-drawer')); loadPages(); });
    $('pages-close').addEventListener('click', function () { closeOverlay($('pages-drawer')); });
    $('pages-drawer').addEventListener('click', function (e) { if (e.target.hasAttribute('data-close-pages')) closeOverlay($('pages-drawer')); });
    $('pages-search').addEventListener('input', renderPagesList);
    $('pages-sort').addEventListener('change', renderPagesList);

    function pageName(p) {
      var t = findTemplate(p.config.template);
      return (t && t.nameField && p.config.values && p.config.values[t.nameField]) ? String(p.config.values[t.nameField]) : p.slug;
    }

    // Top UTM sources for a page, "email 12 · linkedin 5 · (direct) 3".
    function sourcesSummary(p) {
      var s = p.sources || {};
      var entries = Object.keys(s).map(function (k) { return [k, s[k]]; }).sort(function (a, b) { return b[1] - a[1]; });
      if (!entries.length) return '';
      return entries.slice(0, 4).map(function (e) { return escapeText(e[0]) + ' ' + e[1]; }).join(' · ');
    }

    function loadPages() {
      $('pages').innerHTML = '<p class="empty">Loading…</p>';
      api('GET', '/api/pages').then(function (data) {
        allPages = data.pages || [];
        data.pages.forEach(function (p) { knownSlugs[p.slug] = true; });
        renderPagesList();
      }).catch(function (e) { $('pages').innerHTML = '<p class="empty">' + escapeText(e.message) + '</p>'; });
    }

    function renderPagesList() {
      var q = $('pages-search').value.trim().toLowerCase();
      var sort = $('pages-sort').value;
      var rows = allPages.filter(function (p) {
        return !q || p.slug.toLowerCase().indexOf(q) >= 0 || pageName(p).toLowerCase().indexOf(q) >= 0;
      });
      rows.sort(function (a, b) {
        if (sort === 'views') return Number(b.views || 0) - Number(a.views || 0);
        if (sort === 'name') return pageName(a).localeCompare(pageName(b));
        return new Date(b.updated_at || 0) - new Date(a.updated_at || 0);
      });
      if (!rows.length) { $('pages').innerHTML = '<p class="empty">' + (allPages.length ? 'No pages match.' : 'No pages yet. Fill the form and hit Publish.') + '</p>'; return; }
      $('pages').innerHTML = '';
      rows.forEach(function (p) {
        var t = findTemplate(p.config.template);
        var row = document.createElement('div');
        row.className = 'page-row';
        var date = p.updated_at ? new Date(p.updated_at).toLocaleDateString() : '';
        var total = Number(p.views || 0), uniq = Number(p.unique || 0), last7 = Number(p.last7 || 0);
        row.innerHTML =
          '<span class="slug">/page/' + p.slug + '</span>' +
          '<span class="meta">' + escapeText(pageName(p)) + (t ? ' · ' + escapeText(t.name) : '') + (date ? ' · ' + date : '') +
            ' · ' + total + ' views · ' + uniq + ' unique · ' + last7 + ' last 7d</span>' +
          (sourcesSummary(p) ? '<span class="meta">Sources: ' + sourcesSummary(p) + '</span>' : '') +
          '<span class="ops">' +
            '<a class="mini-btn" href="/page/' + p.slug + '" target="_blank" rel="noopener">View</a>' +
            '<button class="mini-btn" data-share type="button">Share</button>' +
            '<button class="mini-btn" data-edit type="button">Edit</button>' +
            '<button class="mini-btn" data-dup type="button">Duplicate</button>' +
            '<button class="mini-btn danger" data-del type="button">Delete</button>' +
          '</span>';
        row.querySelector('[data-share]').addEventListener('click', function () { openShare('/page/' + p.slug); });
        row.querySelector('[data-edit]').addEventListener('click', function () {
          if (!t) { toast('Template "' + escapeText(p.config.template) + '" no longer exists.', 'err'); return; }
          slugTouched = true; editingSlug = p.slug;
          buildForm(t, p.config.values);
          $('f-slug').value = p.slug;
          updateSlugWarn();
          closeOverlay($('pages-drawer'));
        });
        row.querySelector('[data-dup]').addEventListener('click', function () {
          if (!t) { toast('Template "' + escapeText(p.config.template) + '" no longer exists.', 'err'); return; }
          slugTouched = true; editingSlug = null;
          buildForm(t, p.config.values);
          $('f-slug').value = (p.slug + '-copy').slice(0, 64);
          updateSlugWarn(); markDirty();
          closeOverlay($('pages-drawer'));
          toast('Duplicated — rename the slug and Publish', 'ok');
        });
        row.querySelector('[data-del]').addEventListener('click', function () {
          if (!confirm('Delete /page/' + p.slug + '?')) return;
          api('DELETE', '/api/pages/' + p.slug)
            .then(function () {
              delete knownSlugs[p.slug];
              allPages = allPages.filter(function (x) { return x.slug !== p.slug; });
              toast('Deleted /page/' + escapeText(p.slug), 'ok');
              renderPagesList(); updateSlugWarn();
            })
            .catch(function (e) { toast(escapeText(e.message), 'err'); });
        });
        $('pages').appendChild(row);
      });
    }

    /* ---------- analytics ---------- */

    function statCard(value, label) {
      return '<div class="stat-card"><div class="v">' + value + '</div><div class="l">' + label + '</div></div>';
    }

    function openAnalytics() {
      api('GET', '/api/pages').then(function (data) {
        var pages = data.pages || [];
        var totalViews = pages.reduce(function (a, p) { return a + Number(p.views || 0); }, 0);
        var last7 = pages.reduce(function (a, p) { return a + Number(p.last7 || 0); }, 0);
        var srcAgg = {};
        pages.forEach(function (p) {
          var s = p.sources || {};
          Object.keys(s).forEach(function (k) { srcAgg[k] = (srcAgg[k] || 0) + s[k]; });
        });
        var srcEntries = Object.keys(srcAgg).map(function (k) { return [k, srcAgg[k]]; }).sort(function (a, b) { return b[1] - a[1]; });

        $('an-cards').innerHTML =
          statCard(totalViews, 'Total views') +
          statCard(last7, 'Last 7 days') +
          statCard(pages.length, pages.length === 1 ? 'Page' : 'Pages') +
          statCard(escapeText(srcEntries.length ? srcEntries[0][0] : '—'), 'Top source');

        var top = pages.slice().sort(function (a, b) { return Number(b.views || 0) - Number(a.views || 0); }).slice(0, 8);
        $('an-top').innerHTML = top.length ? top.map(function (p) {
          return '<div class="an-row"><span class="nm">' + escapeText(pageName(p)) + '</span>' +
            '<span class="st">' + Number(p.views || 0) + ' views · ' + Number(p.unique || 0) + ' unique · ' + Number(p.last7 || 0) + ' last 7d</span>' +
            '<a class="mini-btn" href="/page/' + p.slug + '" target="_blank" rel="noopener">View</a></div>';
        }).join('') : '<p class="an-empty">No pages yet.</p>';

        var maxc = srcEntries.length ? srcEntries[0][1] : 1;
        $('an-sources').innerHTML = srcEntries.length ? srcEntries.map(function (e) {
          return '<div class="src-row"><span class="nm">' + escapeText(e[0]) + '</span>' +
            '<span class="bar"><i style="width:' + Math.round(e[1] / maxc * 100) + '%"></i></span>' +
            '<span class="ct">' + e[1] + '</span></div>';
        }).join('') : '<p class="an-empty">No views recorded yet.</p>';

        openOverlay($('analytics'));
      }).catch(function (e) { toast('Analytics: ' + escapeText(e.message), 'err'); });
    }
    $('open-analytics').addEventListener('click', openAnalytics);
    $('analytics').addEventListener('click', function (e) { if (e.target.hasAttribute('data-close-analytics')) closeOverlay($('analytics')); });

    /* ---------- publish ---------- */

    $('submit').addEventListener('click', function () {
      var slug = $('f-slug').value.trim();
      if (!current) return;
      if (!SLUG_RE.test(slug)) { return toast('Invalid slug (lowercase letters, digits, hyphens)', 'err'); }
      if (knownSlugs[slug] && slug !== editingSlug && !confirm('A page already exists at /page/' + slug + '. Overwrite it?')) return;
      api('POST', '/api/pages', { slug: slug, template: current.id, values: readValues() })
        .then(function (data) {
          knownSlugs[slug] = true; editingSlug = slug;
          clearDraft(); saveState('Published', true); updateSlugWarn();
          openShare(data.url);
        })
        .catch(function (e) { toast(escapeText(e.message), 'err'); });
    });

    /* ---------- wiring ---------- */

    $('f-slug').addEventListener('input', function () { slugTouched = true; markDirty(); updateSlugWarn(); });

    fetch('/api/templates')
      .then(function (res) { return res.json(); })
      .then(function (data) {
        templates = data.templates || [];
        if (templates.length) { buildForm(templates[0]); maybeOfferRestore(); }
        else { $('tpl-name').textContent = 'No templates'; $('form').innerHTML = '<p class="empty">No templates available.</p>'; }
      })
      .catch(function () { $('tpl-name').textContent = 'Error'; $('form').innerHTML = '<p class="empty">Couldn\'t load templates — is the server up? Refresh to retry.</p>'; });

    // Prime the known-slug set so the overwrite warning works before opening Pages.
    api('GET', '/api/pages').then(function (d) {
      (d.pages || []).forEach(function (p) { knownSlugs[p.slug] = true; });
      updateSlugWarn();
    }).catch(function () {});
  })();
  </script>
</body>
</html>
